name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * 1"
  workflow_dispatch:
    inputs:
      run_screenshot_tour:
        description: Run the synchronized major-surface screenshot census
        required: false
        default: false
        type: boolean
      run_release_suite:
        description: Run every unit and UI journey
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Critical verification
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Build once, run contracts, units, and critical UI journeys
        run: bash ci/verify.sh
      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/verify-critical
          if-no-files-found: warn
          retention-days: 14

  screenshot-tour:
    name: Synchronized visual proof
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_screenshot_tour)
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Run NovaForge visual census
        run: bash ci/pipeline.sh

  release-suite:
    name: Exhaustive release verification
    needs: verify
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_release_suite)
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Run every NovaForge unit and UI test
        env:
          NOVAFORGE_TEST_LANE: release
          XCODEBUILD_CAP_MINUTES: 80
        run: bash ci/verify.sh
      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/verify-release
          if-no-files-found: warn
          retention-days: 14
