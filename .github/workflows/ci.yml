name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_screenshot_tour:
        description: Run the full simulator screenshot and video census
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Compile and focused tests
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - name: Build NovaForge, run unit tests, and smoke Forge streaming
        run: bash ci/verify.sh
      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/verify/build.log
            artifacts/verify/AgentPadTests.xcresult
          if-no-files-found: warn
          retention-days: 14

  screenshot-tour:
    name: Full screenshot tour
    needs: verify
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_screenshot_tour)
    runs-on: macos-26
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Run NovaForge visual census
        run: bash ci/pipeline.sh
