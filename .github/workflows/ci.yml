name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pipeline:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Run NovaForge pipeline
        run: bash ci/pipeline.sh
